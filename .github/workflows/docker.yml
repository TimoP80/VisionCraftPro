name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/timop80/visioncraft-pro
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix={{branch}}-
          
    - name: Build and push CPU image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ghcr.io/timop80/visioncraft-pro:latest
          ghcr.io/timop80/visioncraft-pro:cpu-latest
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build and push GPU image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.gpu
        push: true
        tags: |
          ghcr.io/timop80/visioncraft-pro:gpu-latest
          ghcr.io/timop80/visioncraft-pro:rtx4090
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        
    - name: Build and push Salad Cloud GPU image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.salad
        push: true
        tags: |
          ghcr.io/timop80/visioncraft-pro:salad-gpu
          ghcr.io/timop80/visioncraft-pro:salad-latest
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        
    - name: Build and push Salad Cloud CPU image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.salad-cpu
        push: true
        tags: |
          ghcr.io/timop80/visioncraft-pro:salad-cpu
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
